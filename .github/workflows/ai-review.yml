name: AI Code Review

on:
  pull_request:
    branches: [main]

jobs:
  ai-review:
    name: AI Review Gate
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read    # needed to pull from ghcr.io on private repos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull reviewer image (or build locally if not yet published)
        run: |
          docker pull ghcr.io/${{ github.repository }}:latest || {
            echo "Image not found in registry — building from source (first-time setup)"
            docker build -t ghcr.io/${{ github.repository }}:latest .
          }

      - name: Generate diff (PR head vs base branch)
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff
          echo "=== Diff stats ==="
          wc -l pr.diff

      - name: Run AI review
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          RUST_LOG: ai_reviewer=info
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -e MINIMAX_API_KEY \
            -e DEEPSEEK_API_KEY \
            -e RUST_LOG \
            ghcr.io/${{ github.repository }}:latest \
            --diff /repo/pr.diff \
            --policy /repo/policy.md \
            --source-root /repo \
            --output /repo/review-report.md

      - name: Print review report
        if: always()
        run: |
          echo "========== AI Review Report =========="
          cat review-report.md
          echo "======================================"

      - name: Upload review report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-report
          path: review-report.md
