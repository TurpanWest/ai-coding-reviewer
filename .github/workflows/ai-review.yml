name: AI Code Review

on:
  pull_request:
    branches: [main]

jobs:
  ai-review:
    name: AI Review Gate
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set image tag
        # Local-only tag (we never push from this workflow). The name is
        # arbitrary — keep it lowercase since Docker rejects uppercase repo
        # paths, and ${{ github.repository }} can carry the owner's casing.
        run: |
          IMAGE=$(echo "ai-reviewer-pr:${{ github.event.pull_request.head.sha || github.sha }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build reviewer image from PR source
        # Always rebuild from the PR's HEAD so we test the diff's own changes,
        # not whatever stale :latest happens to be in the registry. The
        # cargo-chef deps layer is cached across runs via GHA cache, so this
        # only recompiles when Cargo.lock or src/** actually changed.
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate diff (PR head vs base branch)
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff
          echo "=== Diff stats ==="
          wc -l pr.diff

      - name: Resolve risk level from PR label
        # Looks for a label named `risk:low`, `risk:medium`, or `risk:high` on
        # the PR.  First match wins.  Missing or unrecognised → `medium`,
        # which reproduces the historical gate behaviour exactly.
        id: risk
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          level=$(echo "$LABELS" \
            | jq -r '.[] | select(test("^risk:(low|medium|high)$"))' \
            | head -n1 \
            | cut -d: -f2)
          echo "level=${level:-medium}" >> "$GITHUB_OUTPUT"
          echo "Resolved risk level: ${level:-medium}"

      - name: Run AI review
        env:
          REVIEWER_1_API_KEY: ${{ secrets.REVIEWER_1_API_KEY }}
          REVIEWER_2_API_KEY: ${{ secrets.REVIEWER_2_API_KEY }}
          # Optional provider overrides (set as repo Variables or Secrets to use).
          # Empty values fall back to the built-in defaults (minimax + deepseek).
          REVIEWER_1_MODEL:    ${{ vars.REVIEWER_1_MODEL }}
          REVIEWER_2_MODEL:    ${{ vars.REVIEWER_2_MODEL }}
          REVIEWER_1_BASE_URL: ${{ vars.REVIEWER_1_BASE_URL }}
          REVIEWER_2_BASE_URL: ${{ vars.REVIEWER_2_BASE_URL }}
          # Per-change risk level resolved from the PR's `risk:*` label above.
          REVIEWER_RISK_LEVEL: ${{ steps.risk.outputs.level }}
          RUST_LOG: ai_reviewer=info
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -e REVIEWER_1_API_KEY \
            -e REVIEWER_2_API_KEY \
            -e REVIEWER_1_MODEL \
            -e REVIEWER_2_MODEL \
            -e REVIEWER_1_BASE_URL \
            -e REVIEWER_2_BASE_URL \
            -e REVIEWER_RISK_LEVEL \
            -e RUST_LOG \
            "$IMAGE" \
            --diff /repo/pr.diff \
            --policy /repo/policy.md \
            --source-root /repo \
            --output /repo/review-report.md

      - name: Print review report
        if: always()
        run: |
          echo "========== AI Review Report =========="
          cat review-report.md
          echo "======================================"

      - name: Upload review report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-report
          path: review-report.md
